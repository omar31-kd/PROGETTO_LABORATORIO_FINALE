<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>InArrivo – Display</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg-color: #f5f5f7;
  --bg-gradient: radial-gradient(circle at top right, #e0e6ed, #f5f5f7 60%);
  --surface: rgba(255, 255, 255, 0.7);
  --surface-solid: #ffffff;
  --text-main: #1d1d1f;
  --text-muted: #86868b;
  --border: rgba(0, 0, 0, 0.08);
  --primary: #0071e3;
  --success: #34c759;
  --radius: 24px;
}

.theme-dark {
  --bg-color: #000000;
  --bg-gradient: radial-gradient(circle at top right, #1a1a24, #000000 60%);
  --surface: rgba(28, 28, 30, 0.7);
  --surface-solid: #1c1c1e;
  --text-main: #f5f5f7;
  --text-muted: #86868b;
  --border: rgba(255, 255, 255, 0.1);
  --primary: #0a84ff;
  --success: #32d74b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background-color: var(--bg-color);
  background-image: var(--bg-gradient);
  color: var(--text-main);
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  transition: background 0.4s, color 0.4s;
  overflow: hidden;
}

/* BACKGROUND MESH for richness */
.bg-mesh {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  z-index: -1; overflow: hidden; pointer-events: none;
}
.bg-mesh::before, .bg-mesh::after {
  content: ''; position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.5;
}
.bg-mesh::before {
  width: 600px; height: 600px; background: rgba(0, 113, 227, 0.15); top: -200px; left: -100px;
}
.bg-mesh::after {
  width: 500px; height: 500px; background: rgba(52, 199, 89, 0.1); bottom: -100px; right: -100px;
}
.theme-dark .bg-mesh::before { background: rgba(10, 132, 255, 0.15); }
.theme-dark .bg-mesh::after { background: rgba(50, 215, 75, 0.15); }

/* HEADER */
header {
  padding: 24px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 10;
}

.brand-info { display: flex; align-items: center; gap: 20px; }
.brand-icon {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, var(--primary), #8bc0f7);
  border-radius: 14px;
  display: flex; justify-content: center; align-items: center;
  color: #fff; font-size: 24px; font-weight: 800;
  box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
}
.brand-text h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
.brand-text p { font-size: 14px; color: var(--text-muted); font-weight: 500; margin-top: 2px; }

.header-right { display: flex; align-items: center; gap: 24px; }
.live-badge {
  display: flex; align-items: center; gap: 8px;
  background: rgba(52, 199, 89, 0.1); color: var(--success);
  padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700;
}
.pulse-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.clock { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; }

/* MAIN CONTENT */
main {
  flex: 1; display: flex; padding: 32px 40px; gap: 32px;
  z-index: 5; position: relative; height: calc(100vh - 160px);
}

.col {
  flex: 1;
  background: var(--surface);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border-radius: var(--radius);
  display: flex; flex-direction: column;
  border: 1px solid var(--border);
  box-shadow: 0 8px 32px rgba(0,0,0,0.04);
  overflow: hidden;
}

.col-header {
  padding: 24px 32px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.col-title-wrap { display: flex; align-items: center; gap: 12px; }
.col-icon {
  width: 40px; height: 40px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.col-title { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
.col-count {
  background: var(--surface-solid); border: 1px solid var(--border);
  padding: 4px 12px; border-radius: 12px; font-weight: 600; font-size: 15px; color: var(--text-muted);
}

.col-lavoro .col-icon { background: rgba(0, 113, 227, 0.1); color: var(--primary); }
.col-lavoro .col-title { color: var(--primary); }
.col-done .col-icon { background: rgba(52, 199, 89, 0.1); color: var(--success); }
.col-done .col-title { color: var(--success); }

/* GRID SCROLL AREA */
.grid-scroll {
  flex: 1; overflow-y: auto; padding: 24px 32px;
  display: flex; flex-direction: column;
}
/* Hide scrollbar */
.grid-scroll::-webkit-scrollbar { display: none; }
.grid-scroll { -ms-overflow-style: none; scrollbar-width: none; }

.grid { display: flex; flex-wrap: wrap; gap: 16px; align-content: flex-start; }

.empty {
  margin: auto; display: flex; flex-direction: column; align-items: center; gap: 16px;
  color: var(--text-muted); opacity: 0.7;
}
.empty-icon { font-size: 48px; }
.empty-text { font-size: 16px; font-weight: 500; }

/* ORDER CHIPS (Rich Design) */
.chip {
  width: calc(50% - 8px);
  background: var(--surface-solid);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 20px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 4px 16px rgba(0,0,0,0.03);
  animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  transition: transform 0.2s, box-shadow 0.2s;
}

@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.chip-num { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
.chip-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }

.col-done .chip {
  background: var(--success);
  border-color: var(--success);
  color: #fff;
  box-shadow: 0 8px 24px rgba(52, 199, 89, 0.3);
}
.col-done .chip-label { color: rgba(255,255,255,0.8); }

.col-done .chip.latest {
  animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), pulseGlow 2s infinite alternate;
}
@keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
@keyframes pulseGlow {
  from { box-shadow: 0 8px 24px rgba(52, 199, 89, 0.4); }
  to { box-shadow: 0 12px 36px rgba(52, 199, 89, 0.7); }
}

/* FOOTER */
footer {
  padding: 16px 40px;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  z-index: 10;
}

.footer-msg { font-size: 14px; font-weight: 500; color: var(--text-muted); }
.partners { display: flex; gap: 12px; align-items: center; }
.partner-tag {
  font-size: 12px; font-weight: 600; color: var(--text-main);
  background: var(--surface-solid); border: 1px solid var(--border);
  padding: 6px 14px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.02);
}

/* ANNOUNCEMENT */
.announce {
  position: fixed; top: 40px; left: 50%; transform: translate(-50%, -150px);
  background: var(--surface-solid); color: var(--text-main);
  padding: 20px 40px; border-radius: 30px; border: 1px solid var(--border);
  display: flex; align-items: center; gap: 20px;
  transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  z-index: 100; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
.announce.show { transform: translate(-50%, 0); }
.ann-icon {
  width: 48px; height: 48px; background: rgba(52, 199, 89, 0.1); color: var(--success);
  border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px;
}
.ann-text { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }

/* RESPONSIVE (PHONES / TABLETS) */
@media (max-width: 900px) {
  body { overflow: auto; }
  main { flex-direction: column; height: auto; padding: 16px; gap: 16px; }
  header { padding: 16px 20px; flex-direction: column; align-items: flex-start; gap: 16px; }
  .header-right { align-self: flex-end; }
  .brand-icon { width: 40px; height: 40px; font-size: 20px; }
  .chip { width: 100%; } /* One card per row on mobile */
  footer { flex-direction: column; gap: 16px; text-align: center; }
}
</style>
</head>
<body>

<div class="bg-mesh"></div>

<div class="announce" id="announce">
  <div class="ann-icon">✅</div>
  <div class="ann-text" id="announceText">Ordine pronto!</div>
</div>

<header>
  <div class="brand-info">
    <div class="brand-icon" id="brandInitial">I</div>
    <div class="brand-text">
      <h1 id="uiName">InArrivo</h1>
      <p id="uiSlogan">Gestione ordini professionale</p>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="pulse-dot"></div> LIVE</div>
    <div class="clock" id="clock">--:--</div>
  </div>
</header>

<main>
  <div class="col col-lavoro">
    <div class="col-header">
      <div class="col-title-wrap">
        <div class="col-icon">🔥</div>
        <div class="col-title">In Preparazione</div>
      </div>
      <div class="col-count" id="countLavoro">0</div>
    </div>
    <div class="grid-scroll">
      <div class="grid" id="gridLavoro"></div>
    </div>
  </div>

  <div class="col col-done">
    <div class="col-header">
      <div class="col-title-wrap">
        <div class="col-icon">✨</div>
        <div class="col-title">Pronti per il Ritiro</div>
      </div>
      <div class="col-count" id="countDone">0</div>
    </div>
    <div class="grid-scroll">
      <div class="grid" id="gridDone"></div>
    </div>
  </div>
</main>

<footer>
  <div class="footer-msg">Ti preghiamo di conservare lo scontrino.</div>
  <div class="partners" id="uiPartners"></div>
</footer>

<script>
const DB_KEY = 'inarrivo_db';
let db = null;
let me = null;
let prevDoneIds = [];

setInterval(()=>{
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
},1000);

function loadData(){
  const raw = localStorage.getItem(DB_KEY);
  if(!raw) return;
  db = JSON.parse(raw);
  if(db.currentUser && db.restaurants[db.currentUser]){
    me = db.restaurants[db.currentUser];
    applySettings();
    renderOrders();
  } else if(db.restaurants['demo1']){
    me = db.restaurants['demo1'];
    applySettings();
    renderOrders();
  }
}

function applySettings(){
  document.body.className = me.theme === 'dark' ? 'theme-dark' : '';
  document.getElementById('uiName').textContent = me.name;
  document.getElementById('uiSlogan').textContent = me.slogan || '';
  document.getElementById('brandInitial').textContent = me.name.charAt(0).toUpperCase();
  
  const partnersDiv = document.getElementById('uiPartners');
  partnersDiv.innerHTML = '';
  if(me.partners && me.partners.length){
    me.partners.forEach(p => {
      const sp = document.createElement('span');
      sp.className = 'partner-tag';
      sp.textContent = p;
      partnersDiv.appendChild(sp);
    });
  }
}

function renderOrders(){
  if(!me.orders) return;
  
  document.getElementById('countLavoro').textContent = me.orders.lavoro.length;
  document.getElementById('countDone').textContent = me.orders.done.length;
  
  const currentDoneIds = me.orders.done.map(o=>o.id);
  const newDones = me.orders.done.filter(o => !prevDoneIds.includes(o.id));
  if(newDones.length>0 && prevDoneIds.length>0){
    const latest = newDones[newDones.length-1];
    announceOrder(latest.num);
  }
  prevDoneIds = currentDoneIds;

  const gLavoro = document.getElementById('gridLavoro');
  gLavoro.innerHTML = '';
  if(me.orders.lavoro.length===0){
    gLavoro.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div><div class="empty-text">Nessun ordine in preparazione</div></div>';
  } else {
    me.orders.lavoro.forEach(o => {
      const d = document.createElement('div');
      d.className = 'chip';
      d.innerHTML = `
        <div class="chip-num">${o.num}</div>
        <div class="chip-label">Prep</div>
      `;
      gLavoro.appendChild(d);
    });
  }

  const gDone = document.getElementById('gridDone');
  gDone.innerHTML = '';
  if(me.orders.done.length===0){
    gDone.innerHTML = '<div class="empty"><div class="empty-icon">🍽️</div><div class="empty-text">Nessun ordine pronto</div></div>';
  } else {
    me.orders.done.forEach((o, idx) => {
      const d = document.createElement('div');
      d.className = 'chip';
      if(idx === me.orders.done.length-1) d.classList.add('latest');
      d.innerHTML = `
        <div class="chip-num">${o.num}</div>
        <div class="chip-label">Pronto</div>
      `;
      gDone.appendChild(d);
    });
  }
}

let annTime;
function announceOrder(num){
  const el = document.getElementById('announce');
  document.getElementById('announceText').textContent = `Ordine ${num} pronto!`;
  el.classList.add('show');
  
  if('speechSynthesis' in window){
    const utt = new SpeechSynthesisUtterance(`Ordine numero ${num} pronto.`);
    utt.lang = 'it-IT';
    utt.rate = 0.9;
    window.speechSynthesis.speak(utt);
  }

  clearTimeout(annTime);
  annTime = setTimeout(()=>el.classList.remove('show'), 4000);
}

window.addEventListener('storage', e => { if(e.key === DB_KEY) loadData(); });

if(typeof BroadcastChannel !== 'undefined'){
  const bc = new BroadcastChannel('inarrivo_sync');
  bc.onmessage = (e) => { if(e.data==='update') loadData(); }
}

loadData();
document.getElementById('clock').textContent = new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
</script>
</body>
</html>
